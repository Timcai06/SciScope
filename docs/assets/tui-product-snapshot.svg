<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">SciScope TUI product snapshot</title>
  <desc id="desc">Terminal-style snapshot showing SciScope splash, system status, evidence timeline, and composer.</desc>
  <rect width="980" height="620" fill="#101414"/>
  <rect x="34" y="28" width="912" height="564" rx="12" fill="#161b1b" stroke="#5fd7d7" stroke-width="2"/>
  <text x="58" y="66" fill="#5fd7d7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700">◆ SciScope</text>
  <text x="190" y="66" fill="#d7d7d7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">科研智能体终端</text>
  <text x="58" y="108" fill="#5fd7d7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">SCISCOPE</text>
  <text x="58" y="136" fill="#808080" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">evidence-first research agent · local sessions · reproducible export</text>

  <rect x="58" y="166" width="264" height="130" rx="8" fill="#111717" stroke="#4b5b5b"/>
