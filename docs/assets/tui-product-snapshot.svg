  <text x="78" y="228" fill="#b8c8c8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">/demo       golden flow</text>
  <text x="78" y="254" fill="#b8c8c8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">/sessions   recent work</text>
  <text x="78" y="280" fill="#b8c8c8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">/doctor     readiness</text>

  <rect x="358" y="166" width="264" height="130" rx="8" fill="#111717" stroke="#4b5b5b"/>
  <text x="378" y="196" fill="#5fd7d7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">System status</text>
  <text x="378" y="228" fill="#b8c8c8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">Backend  check with /doctor</text>
  <text x="378" y="254" fill="#b8c8c8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">LLM      check with /doctor</text>
  <text x="378" y="280" fill="#b8c8c8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">Sessions ~/.sciscope/sessions</text>

  <rect x="658" y="166" width="264" height="130" rx="8" fill="#111717" stroke="#4b5b5b"/>
  <text x="678" y="196" fill="#5fd7d7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">Golden demo</text>
  <text x="678" y="228" fill="#b8c8c8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">verify_claim -> evidence</text>
  <text x="678" y="254" fill="#b8c8c8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">cross-language grounding</text>
  <text x="678" y="280" fill="#b8c8c8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">timeline · export · retry</text>

  <rect x="58" y="324" width="864" height="120" rx="8" fill="#111717" stroke="#4b5b5b"/>
