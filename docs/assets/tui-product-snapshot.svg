  <text x="78" y="408" fill="#d7d7d7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">│  [2] 调用 verify_claim 做跨语言接地核查</text>
  <text x="78" y="434" fill="#808080" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">╰─</text>

