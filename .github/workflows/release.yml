name: release

# Push a version tag to cut a release:  git tag v0.1.0 && git push origin v0.1.0
# Builds multi-platform binaries for the Go terminal client and publishes a
# Homebrew cask to the tap repo (Timcai06/homebrew-sciscope).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Verify hosted backend URL
        run: test -n "$SCISCOPE_HOSTED_BACKEND_URL"
        env:
          SCISCOPE_HOSTED_BACKEND_URL: ${{ secrets.SCISCOPE_HOSTED_BACKEND_URL }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: tui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # token with write access to the tap repo (set in repo secrets)
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCISCOPE_HOSTED_BACKEND_URL: ${{ secrets.SCISCOPE_HOSTED_BACKEND_URL }}

  npm:
    needs: goreleaser
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: env.NPM_TOKEN != ''
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Publish npm package
        if: env.NPM_TOKEN != ''
        working-directory: packaging/npm/sciscope-tui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm pkg set sciscopeTui.binaryVersion="$VERSION"
          npm publish
      - name: Skip npm publish
        if: env.NPM_TOKEN == ''
        run: echo "NPM_TOKEN is not configured; skipping npm publish."
