name: release

# Push a version tag to cut a release:  git tag v0.1.0 && git push origin v0.1.0
# Builds multi-platform binaries for the Go terminal client and publishes a
# Homebrew cask to the tap repo (Timcai06/homebrew-sciscope).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Verify hosted backend URL
        run: test -n "$SCISCOPE_HOSTED_BACKEND_URL"
        env:
          SCISCOPE_HOSTED_BACKEND_URL: ${{ secrets.SCISCOPE_HOSTED_BACKEND_URL }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: tui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # token with write access to the tap repo (set in repo secrets)
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCISCOPE_HOSTED_BACKEND_URL: ${{ secrets.SCISCOPE_HOSTED_BACKEND_URL }}
